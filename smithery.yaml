# Smithery configuration file: https://smithery.ai/docs/config#smitheryyaml
#
# Lets Smithery (smithery.ai) discover and launch this MCP server as a local
# stdio process. Google auth is handled separately via `npm run setup-auth`,
# so no launch-time config is required.

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    properties: {}
  commandFunction:
    # A function that produces the CLI command to start the MCP on stdio.
    |-
    (config) => ({ command: 'npx', args: ['-y', '@roomi-fields/notebooklm-mcp@latest'], env: {} })
